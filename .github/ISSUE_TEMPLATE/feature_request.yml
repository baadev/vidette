name: Feature request
description: Propose a capability or an improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Check [ROADMAP.md](https://github.com/baadev/vidette/blob/main/ROADMAP.md) first —
        if it's already 📐 designed, comment on the design instead (or say what's wrong with it).
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that you can't? Start from the pain, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
  - type: dropdown
    id: budget
    attributes:
      label: Which budget does this touch most?
      description: Vidette treats compute / storage / latency as features — helps triage.
      options: [compute, storage, latency, none/UX-only, not sure]
