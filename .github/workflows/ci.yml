name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install
        run: uv sync --dev
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Types (mypy strict)
        run: uv run mypy vidette
      - name: Tests
        run: uv run pytest -q
      - name: Example config validates
        run: |
          CAM_PASSWORD=x EUFY_RTSP_PASSWORD=x VIDETTE_WEBHOOK_SECRET=x TG_BOT_TOKEN=x TG_CHAT_ID=x \
            uv run vidette validate ../deploy/config.example.yaml

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
