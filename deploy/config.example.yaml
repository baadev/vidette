# Vidette configuration — annotated example.
#
# This file is executable documentation: a test in server/tests/test_config.py keeps it valid
# against the schema, so it can never drift from the code. Reference: docs/configuration.md.
#
# Conventions:
#   - durations: "90s" "30m" "12h" "3d" "forever"
#   - secrets are ${ENV_VAR} references — never literals (unset vars fail validation, loudly)
#   - zone points are normalized 0.0–1.0 → resolution-independent
#
# Validate any time:  vidette validate /config/vidette.yaml

server:
  port: 8642
  # base_url: https://vidette.example.com   # used in notification links
  auth:
    mode: builtin          # first run forces admin creation; no default credentials, ever

storage:
  media_dir: /media/vidette
  database: /config/vidette.db
  retention:               # per-class retention — not one global dial (docs/architecture/storage.md)
    continuous: 3d
    motion: 14d
    events: 90d
    favorites: forever
  compaction:              # 📐 M3: re-encode cold footage to HEVC/AV1 during idle hours
    enabled: false
  offsite:                 # 📐 M3: S3-compatible backup of events + DB snapshot
    enabled: false

cameras:
  # Any RTSP/ONVIF camera — Vidette's native tongue (docs/cameras/onvif-rtsp.md).
  front-door:
    adapter: rtsp
    name: "Front door"
    source:
      main: rtsp://cam:${CAM_PASSWORD}@10.0.20.11:554/stream1
      sub:  rtsp://cam:${CAM_PASSWORD}@10.0.20.11:554/stream2   # low-res twin — the AI decodes this one
    power_profile: mains   # mains (default): stream held permanently open, instant live view,
                           # fast retries. battery: opt-in for cameras that sleep between
                           # events — no keep-warm, failures back off up to 5 min.
    record:
      mode: continuous     # continuous | motion | events | off
    detect:
      fps: 5
    zones:
      # entry: approach/dwell/touch here is high-signal
      door:   { kind: entry,  points: [[0.42, 0.31], [0.58, 0.31], [0.58, 0.78], [0.42, 0.78]] }
      # public: tracks that never leave this zone are suppressed — the passers-by killer
      street: { kind: public, points: [[0.0, 0.8], [1.0, 0.8], [1.0, 1.0], [0.0, 1.0]] }

  # Eufy cameras: the ONLY integration path is the camera's built-in NAS (RTSP) feature,
  # available on supported models (Eufy app → camera → Settings → General → Storage →
  # NAS (RTSP)). No bridge, no cloud — it's a plain RTSP source. Eufy serves exactly ONE
  # RTSP client at a time — Vidette funnels everything through its single gateway
  # connection, so don't point VLC/another NVR at the camera too. Details, supported-model
  # notes and battery caveats: docs/cameras/eufy.md.
  backyard:
    adapter: rtsp
    name: "Backyard (eufyCam via NAS/RTSP)"
    power_profile: battery # battery Eufys sleep between events — let them
    source:
      main: rtsp://user:${EUFY_RTSP_PASSWORD}@10.0.20.30/live0

understanding:
  detector:
    model: auto            # picked by hardware (docs/architecture/ai-pipeline.md#tier-1--detection)
    hardware: auto         # auto | cpu | cuda | openvino | coreml | hailo | coral
  vlm:                     # 📐 M3 — scene reasoning; local-first
    provider: none         # switch to `ollama` + model: qwen2.5-vl:7b with the compose vlm profile
  faces:                   # 📐 M4 — trusted faces: suppress alerts caused by your household.
    enabled: false         # Local-only; enrollment via the UI — biometrics never live in YAML.
  embeddings:
    enabled: false         # 📐 M3 — semantic search over events

policies:
  # 📐 M4 north star: plain language, compiled to an inspectable spec you approve.
  # Until M4 the geometric skeleton applies (zones + sensitivity presets, M2).
  - name: entry-interest
    description: >
      Alert when a person shows interest in entering: approaching the door, lingering,
      touching the door or windows, peering in. Ignore pass-through pedestrians and
      routine deliveries.
    cameras: [front-door]
    sensitivity: balanced  # relaxed | balanced | paranoid
    # ignore_trusted: true # default — don't alert on enrolled trusted faces (M4)
    actions: [notify]

notifications:
  channels:
    push:
      kind: webpush        # PWA push — no vendor cloud between camera and phone
    telegram:
      kind: apprise        # one Apprise URL = Telegram/Discord/Slack/ntfy/… (100+ services)
      url: "tgram://${TG_BOT_TOKEN}/${TG_CHAT_ID}"
    hooks:
      kind: webhook        # signed: X-Vidette-Signature (docs/events-and-automations.md)
      url: https://automation.example.com/vidette
      secret: ${VIDETTE_WEBHOOK_SECRET}
      include: [summary, snapshot_url, clip_url]
  rules:
    - when: event.confirmed
      channels: [push, telegram, hooks]
    - when: system.*       # disk pressure, camera offline, recorder gaps — it snitches on itself
      channels: [hooks]

integrations:
  mqtt:
    enabled: false         # 📐 M2 — Home Assistant discovery included
    # host: mqtt.local
    # username: vidette
    # password: ${MQTT_PASSWORD}

telemetry:
  enabled: false           # default forever; the key exists so the promise is visible
